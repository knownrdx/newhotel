services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NEXT_PUBLIC_APP_URL: https://wifi.example.com
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:${POSTGRES_PASSWORD}@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.workers.poller"]
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:${POSTGRES_PASSWORD}@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - db
      - redis
      - backend

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "scripts.seed_demo"]
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:${POSTGRES_PASSWORD}@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - db
      - backend
    restart: "no"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotelwifi
      POSTGRES_USER: hotelwifi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
