name: hotel-wifi-saas

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hotelwifi
      POSTGRES_USER: hotelwifi
      POSTGRES_PASSWORD: hotelwifi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelwifi -d hotelwifi"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:hotelwifi@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: replace-me-in-production
      ENCRYPTION_KEY: 01234567890123456789012345678901
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.poller"]
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:hotelwifi@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: replace-me-in-production
      ENCRYPTION_KEY: 01234567890123456789012345678901
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  seed:
    build:
      context: ./backend
    command: ["python", "-m", "scripts.seed_demo"]
    environment:
      POSTGRES_DSN: postgresql+psycopg://hotelwifi:hotelwifi@db:5432/hotelwifi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: replace-me-in-production
      ENCRYPTION_KEY: 01234567890123456789012345678901
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
